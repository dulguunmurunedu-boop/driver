services:
  - type: web
    name: driving-test-app
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TEACHER_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: driving-test-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
