services:
  - type: web
    name: driving-test-app
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TEACHER_PASSWORD
        sync: false
      # MongoDB Atlas connection string (free M0 cluster). Data persists here
      # because the free tier has no persistent disk.
      - key: MONGODB_URI
        sync: false
